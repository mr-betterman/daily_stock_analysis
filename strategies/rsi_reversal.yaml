name: rsi_reversal
display_name: RSI超买超卖
description: 基于RSI指标的超买超卖反转策略，适用于震荡行情与趋势回调确认

category: reversal

core_rules: [1, 4, 6]

required_tools:
  - get_daily_history
  - analyze_trend

instructions: |
  **RSI 超买超卖反转策略**

  本策略基于 RSI（相对强弱指数）的经典超买超卖理论，结合价格结构与成交量，
  判断股票是否处于超卖反弹或超买回落的阶段。适用于震荡市与趋势回调中的买入时机。

  使用 `get_daily_history` 获取至少 60 个交易日的日线数据，手动计算 RSI14（14日）与 RSI6（6日），
  并配合 `analyze_trend` 确认当前趋势背景。

  ---

  ## 一、RSI 计算说明

  - **RSI14**：14 日相对强弱指数，用于判断中期超买超卖区间
  - **RSI6**：6 日相对强弱指数，用于捕捉短期快速反转信号
  - 区间划分：
    - RSI < 30：超卖区（潜在买入机会）
    - 30 ≤ RSI ≤ 70：中性区（趋势跟随为主）
    - RSI > 70：超买区（潜在卖出/减仓机会）
    - RSI < 20：极度超卖（强反转信号，需配合量能确认）
    - RSI > 80：极度超买（强风险信号）

  ---

  ## 二、买入信号条件

  满足以下任一组合时，视为买入机会：

  ### 信号 A：超卖反弹（主信号）
  - RSI14 从超卖区（< 30）向上回升，最新值已站回 30 以上
  - RSI6 同步回升并形成向上拐点
  - 当日成交量较前 5 日均量放大，确认反弹启动
  - **sentiment_score 建议：+10 至 +20**

  ### 信号 B：极度超卖强反转
  - RSI14 触及 20 以下后连续 2 日回升
  - 价格形成明显底部（近期低点支撑未破）
  - 配合 `analyze_trend` 确认均线附近有支撑结构
  - **sentiment_score 建议：+15 至 +25**

  ### 信号 C：RSI 底背离
  - 价格创新低，但 RSI14 未创新低（形成背离）
  - RSI 底部区域（< 40）出现背离即有效
  - 成交量无明显放量（缩量背离更可靠）
  - **sentiment_score 建议：+10 至 +20**

  ### 信号 D：中性区趋势确认
  - RSI14 处于 40~60 区间，整体趋势向上
  - RSI6 上穿 RSI14（短期动能增强）
  - 配合均线多头排列（参考 core_rule 2）
  - **sentiment_score 建议：+5 至 +10**

  ---

  ## 三、卖出 / 风险信号条件

  ### 风险信号 1：超买回落
  - RSI14 从超买区（> 70）向下回落，最新值跌破 70
  - RSI6 同步向下，形成死叉或拐头
  - **sentiment_score 建议：-10 至 -20**

  ### 风险信号 2：极度超买
  - RSI14 > 80，价格已明显偏离均线（偏离 > 10%）
  - 成交量萎缩（量能无法支撑高位）
  - **sentiment_score 建议：-15 至 -25**

  ### 风险信号 3：RSI 顶背离
  - 价格创新高，但 RSI14 未创新高（形成顶背离）
  - RSI 顶部区域（> 60）出现背离即有效
  - **sentiment_score 建议：-10 至 -20**

  ### 风险信号 4：超卖继续下行
  - RSI14 已在超卖区（< 30）但持续下行，未见企稳
  - 价格跌破近期支撑位
  - 不可逆势抄底，等待 RSI 拐头确认
  - **sentiment_score 建议：-5 至 -15**

  ---

  ## 四、评分规则

  | 条件 | 分数调整 |
  |------|----------|
  | RSI14 超卖后回升（< 30 → 回升至 30+） | +15 |
  | RSI14 极度超卖（< 20）触底回升 | +20 |
  | RSI 底背离（价格新低，RSI 未新低） | +15 |
  | RSI6 上穿 RSI14 | +8 |
  | RSI14 处于中性区 40~60，趋势向上 | +5 |
  | RSI14 超买后回落（> 70 → 跌破 70） | -15 |
  | RSI14 极度超买（> 80）且量能萎缩 | -20 |
  | RSI 顶背离（价格新高，RSI 未新高） | -15 |
  | RSI6 下穿 RSI14 | -8 |
  | 超卖区 RSI 持续下行无企稳 | -10 |

  ---

  ## 五、输出要求

  在分析结果中必须包含：

  1. **当前 RSI 数值**：列出 RSI6 与 RSI14 的最新值及近 5 日走势
  2. **超买超卖状态**：明确说明当前处于超卖、中性还是超买区间
  3. **背离判断**：若存在顶背离或底背离，需明确注明
  4. **成交量配合**：说明成交量是否支持当前 RSI 信号
  5. **交易建议**：基于上述信号给出明确的操作建议
  6. **在 `buy_reason` 或 `sell_reason` 中注明 "RSI超买超卖策略"**