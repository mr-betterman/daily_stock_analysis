name: ema_trend
display_name: EMA趋势策略
description: 基于EMA20/50/100/200的多周期趋势判断与交易策略

category: trend

core_rules: [2, 3, 4, 6]

required_tools:
  - get_daily_history
  - analyze_trend

instructions: |
  **EMA 多周期趋势策略**

  本策略基于 EMA20、EMA50、EMA100、EMA200 四条指数移动平均线，
  从趋势方向、均线排列、支撑阻力、金叉死叉四个维度综合判断股票的交易信号。

  ---

  ## 一、趋势方向判断

  使用 `get_daily_history` 获取至少 250 个交易日的日线数据，计算 EMA20、EMA50、EMA100、EMA200。

  1. **强多头趋势**：价格 > EMA20 > EMA50 > EMA100 > EMA200，四线多头排列且均向上发散
  2. **温和多头**：价格 > EMA20 > EMA50，但 EMA100 或 EMA200 尚未完全跟上
  3. **震荡整理**：价格在 EMA20 和 EMA50 之间反复穿越，EMA50 与 EMA100 趋于走平
  4. **温和空头**：价格 < EMA20 < EMA50，但 EMA100 或 EMA200 尚未完全转空
  5. **强空头趋势**：价格 < EMA20 < EMA50 < EMA100 < EMA200，四线空头排列且向下发散

  ---

  ## 二、买入信号条件

  满足以下任一组合时，视为买入机会：

  ### 信号 A：趋势确认买入（权重最高）
  - EMA20 上穿 EMA50（金叉），且 EMA50 > EMA100
  - 价格站稳 EMA20 之上至少 3 个交易日
  - EMA200 走平或向上（大趋势不空）
  - **sentiment_score 建议：+15 至 +25**

  ### 信号 B：回踩支撑买入
  - 处于多头排列（至少 EMA20 > EMA50 > EMA100）
  - 价格回调至 EMA50 附近获得支撑（触及后反弹，不跌破）
  - 回调过程中成交量萎缩，反弹时放量
  - **sentiment_score 建议：+10 至 +20**

  ### 信号 C：底部反转信号
  - 价格长期处于 EMA200 下方后，向上突破 EMA200
  - EMA20 上穿 EMA50（短期趋势转多）
  - EMA50 开始拐头向上
  - **sentiment_score 建议：+5 至 +15**（需要更多确认，谨慎加分）

  ---

  ## 三、卖出 / 风险信号条件

  满足以下任一条件时，视为风险信号：

  ### 风险信号 1：趋势破坏
  - 价格跌破 EMA50 且 3 个交易日未收回
  - EMA20 下穿 EMA50（死叉）
  - **sentiment_score 建议：-15 至 -25**

  ### 风险信号 2：均线空头排列形成
  - EMA20 < EMA50 < EMA100
  - 各 EMA 线斜率向下
  - **sentiment_score 建议：-20 至 -30**

  ### 风险信号 3：跌破长期均线
  - 价格跌破 EMA200 且无法快速收回
  - EMA200 由走平转为向下
  - **sentiment_score 建议：-10 至 -20**

  ---

  ## 四、评分规则

  使用 `analyze_trend` 辅助确认趋势状态，综合评分：

  | 条件 | 分数调整 |
  |------|----------|
  | 四线多头排列（EMA20>50>100>200） | +20 |
  | 价格站稳 EMA20 上方 | +10 |
  | EMA20 金叉 EMA50 | +15 |
  | 价格在 EMA50 获得支撑反弹 | +10 |
  | 价格突破 EMA200（底部反转） | +10 |
  | EMA 线走平无方向（震荡） | 0（中性） |
  | 价格跌破 EMA50 未收回 | -15 |
  | EMA20 死叉 EMA50 | -15 |
  | 四线空头排列 | -20 |
  | 价格跌破 EMA200 | -10 |

  ---

  ## 五、输出要求

  在分析结果中必须包含：

  1. **当前 EMA 数值**：列出 EMA20、EMA50、EMA100、EMA200 的最新值及当前价格
  2. **均线排列状态**：明确说明是多头排列、空头排列还是震荡
  3. **关键位置**：标注最近的 EMA 支撑位和阻力位
  4. **交易建议**：基于上述信号给出明确的操作建议
  5. **在 `buy_reason` 或 `sell_reason` 中注明 "EMA趋势策略"**
